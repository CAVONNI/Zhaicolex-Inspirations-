<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iniciar Sesion</title>

    <style>
      * {
        box-sizing: border-box;
        font-family: Arial, Helvetica, sans-serif;
      }

      body {
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #f5f5f5;
      }

      .login-container {
        background: #ffffff;
        width: 360px;
        padding: 40px 30px;
        border-radius: 8px;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
      }

      .login-container h1 {
        text-align: center;
        margin-bottom: 30px;
        font-weight: 400;
        color: #777;
        letter-spacing: 2px;
      }

      .input-group {
        position: relative;
        margin-bottom: 20px;
      }

      .input-group input {
        width: 100%;
        padding: 12px 12px 12px 45px;
        border: 2px solid #ccc;
        border-radius: 6px;
        font-size: 14px;
        outline: none;
      }

      .input-group input:focus {
        border-color: #3bb0f5;
      }

      .input-group span {
        position: absolute;
        top: 50%;
        left: 12px;
        transform: translateY(-50%);
        font-size: 18px;
        color: #999;
      }

      .options {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-size: 13px;
        margin-bottom: 25px;
        color: #777;
      }

      .options a {
        text-decoration: none;
        color: #777;
      }

      .options a:hover {
        text-decoration: underline;
      }

      .login-container button {
        width: 100%;
        padding: 12px;
        background-color: #3bb0f5;
        border: none;
        border-radius: 6px;
        color: white;
        font-size: 16px;
        cursor: pointer;
      }

      .login-container button:hover {
        background-color: #2a9adf;
      }
      .volver-index {
        display: block;
        margin-top: 15px;
        text-align: center;
        text-decoration: none;
        color: #555;
        font-size: 14px;
      }

      .volver-index:hover {
        text-decoration: underline;
        color: #000;
      }
    </style>
  </head>

  <body>
    <div class="login-container">
      <h1>Iniciar Sesion</h1>

      <div class="input-group">
        <span>👤</span>
        <input type="text" id="usuario1" placeholder="Usuario" />
      </div>

      <div class="input-group">
        <span>🔒</span>
        <input type="password" id="contraseña1" placeholder="Contraseña" />
      </div>

      <button onclick="cadenadefunciones()">Inciar</button>
      <a href="index.html" class="volver-index">← Volver al inicio</a>
    </div>

          alert("Inicio exitoso");
          window.location.href = "Form_compra.html";
        } else {
          alert("Usuario no autorizado");
        }
      }
    </script>-->
  </body>
</html>
