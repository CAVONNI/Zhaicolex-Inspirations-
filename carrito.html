<!DOCTYPE html>
<html lang="es-CO">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carrito - Zhaicolez Inspirations</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: Arial, Helvetica, sans-serif;
      }

      body {
        background: #f8f8f8;
        color: #000;
      }

      /* HEADER */
      header {
        background: #fff;
        border-bottom: 1px solid #e5e5e5;
        padding: 16px 40px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .logo {
        font-size: 22px;
        font-weight: bold;
        letter-spacing: 2px;
      }

      nav ul {
        list-style: none;
        display: flex;
        gap: 24px;
      }

      nav ul li a {
        font-size: 14px;
        text-decoration: none;
        color: #000;
      }

      nav ul li a:hover {
        text-decoration: underline;
      }

      /* CONTENEDOR PRINCIPAL */
      .container {
        max-width: 1200px;
        margin: 40px auto;
        padding: 0 20px;
      }

      .cart-header {
        background: #fff;
        padding: 24px;
        margin-bottom: 24px;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      .cart-header h1 {
        font-size: 28px;
        margin-bottom: 8px;
      }

      .cart-content {
        display: grid;
        grid-template-columns: 1fr 380px;
        gap: 24px;
      }

      /* PRODUCTOS */
      .products-section {
        background: #fff;
        padding: 24px;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      .empty-cart {
        text-align: center;
        padding: 60px 20px;
      }

      .empty-cart h2 {
        font-size: 24px;
        margin-bottom: 12px;
        color: #666;
      }

      .empty-cart p {
        color: #999;
        margin-bottom: 24px;
      }

      .btn-primary {
        background: #000;
        color: #fff;
        padding: 14px 32px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 14px;
        text-decoration: none;
        display: inline-block;
        transition: background 0.3s;
      }

      .btn-primary:hover {
        background: #333;
      }

      .cart-item {
        display: flex;
        gap: 16px;
        padding: 20px 0;
        border-bottom: 1px solid #e5e5e5;
      }

      .cart-item:last-child {
        border-bottom: none;
      }

      .item-image {
        width: 100px;
        height: 100px;
        object-fit: contain;
        background: #f2f2f2;
        border-radius: 4px;
        flex-shrink: 0;
      }

      .item-details {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .item-brand {
        font-weight: bold;
        font-size: 14px;
      }

      .item-name {
        font-size: 16px;
        color: #333;
      }

      .item-type {
        font-size: 13px;
        color: #666;
      }

      .item-actions {
        display: flex;
        align-items: center;
        gap: 16px;
        margin-top: 8px;
      }

      .quantity-controls {
        display: flex;
        align-items: center;
        gap: 12px;
        border: 1px solid #ddd;
        border-radius: 4px;
        padding: 4px 8px;
      }

      .quantity-btn {
        background: none;
        border: none;
        font-size: 18px;
        cursor: pointer;
        padding: 4px 8px;
        color: #333;
      }

      .quantity-btn:hover {
        color: #000;
      }

      .quantity {
        font-size: 14px;
        min-width: 30px;
        text-align: center;
      }

      .remove-btn {
        background: none;
        border: none;
        color: #999;
        cursor: pointer;
        font-size: 13px;
        text-decoration: underline;
      }

      .remove-btn:hover {
        color: #000;
      }

      .item-price {
        font-weight: bold;
        font-size: 18px;
        text-align: right;
      }

      /* RESUMEN */
      .summary-section {
        background: #fff;
        padding: 24px;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        height: fit-content;
        position: sticky;
        top: 20px;
      }

      .summary-section h2 {
        font-size: 20px;
        margin-bottom: 20px;
        padding-bottom: 16px;
        border-bottom: 1px solid #e5e5e5;
      }

      .summary-row {
        display: flex;
        justify-content: space-between;
        margin-bottom: 12px;
        font-size: 14px;
      }

      .summary-row.total {
        font-size: 18px;
        font-weight: bold;
        margin-top: 16px;
        padding-top: 16px;
        border-top: 2px solid #000;
      }

      .checkout-btn {
        width: 100%;
        background: #000;
        color: #fff;
        padding: 16px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 16px;
        margin-top: 20px;
        transition: background 0.3s;
      }

      .checkout-btn:hover {
        background: #333;
      }

      .continue-shopping {
        text-align: center;
        margin-top: 16px;
      }

      .continue-shopping a {
        color: #666;
        text-decoration: none;
        font-size: 14px;
      }

      .continue-shopping a:hover {
        text-decoration: underline;
        color: #000;
      }

      /* RESPONSIVE */
      @media (max-width: 968px) {
        .cart-content {
          grid-template-columns: 1fr;
        }

        .summary-section {
          position: static;
        }
      }

      @media (max-width: 600px) {
        header {
          padding: 16px 20px;
        }

        .logo {
          font-size: 18px;
        }

        nav ul {
          gap: 16px;
        }

        .cart-item {
          flex-direction: column;
        }

        .item-image {
          width: 100%;
          height: 200px;
        }

        .item-price {
          text-align: left;
        }
      }
    </style>
  </head>
  <body>
    <!-- HEADER -->
    <header>
      <div class="logo">ZHAICOLEZ INSPIRATIONS</div>
      <nav>
        <ul>
          <li><a href="catalogo.html">Volver al catálogo</a></li>
          <li>
            <a href="https://wa.me/573151821269" target="_blank">WhatsApp</a>
          </li>
        </ul>
      </nav>
    </header>

    <!-- CONTENIDO PRINCIPAL -->
    <div class="container">
      <div class="cart-header">
        <h1>Mi Carrito</h1>
        <p id="item-count">0 productos</p>
      </div>

      <div class="cart-content">
        <!-- PRODUCTOS -->
        <div class="products-section">
          <div id="cart-items">
            <div class="empty-cart">
              <h2>Tu carrito está vacío</h2>
              <p>Agrega productos desde nuestro catálogo</p>
              <a href="/catalogo.html" class="btn-primary">Ir al catálogo</a>
            </div>
          </div>
        </div>

        <!-- RESUMEN -->
        <div class="summary-section" id="summary" style="display: none">
          <h2>Resumen del pedido</h2>
          <div class="summary-row">
            <span>Subtotal</span>
            <span id="subtotal">$ 0</span>
          </div>
          <div class="summary-row">
            <span>Envío</span>
            <span id="shipping">A calcular</span>
          </div>
          <div class="summary-row total">
            <span>Total</span>
            <span id="total">$ 0</span>
          </div>
          <button class="checkout-btn" onclick="checkout()">
            Realizar pedido
          </button>
          <div class="continue-shopping">
            <a href="/catalogo.html">← Continuar comprando</a>
          </div>
        </div>
      </div>
    </div>

    <script>
      let cart = [];
      let sessionId = "";

      // Generar ID de sesión único
      function generateSessionId() {
        return (
          "session_" +
          Date.now() +
          "_" +
          Math.random().toString(36).substr(2, 9)
        );
      }

      // Obtener o crear ID de sesión
      function getSessionId() {
        // Buscar en sessionStorage (se borra al cerrar navegador/pestaña)
        let session = sessionStorage.getItem("zhaicolezSessionId");

        if (!session) {
          // Crear nueva sesión
          session = generateSessionId();
          sessionStorage.setItem("zhaicolezSessionId", session);
          console.log("Nueva sesión creada:", session);
        } else {
          console.log("Sesión existente:", session);
        }

        return session;
      }

      // Cargar carrito de la sesión actual
      function loadCart() {
        sessionId = getSessionId();
        const cartKey = "zhaicolezCart_" + sessionId;
        const savedCart = localStorage.getItem(cartKey);

        if (savedCart) {
          cart = JSON.parse(savedCart);
          console.log("Carrito cargado para sesión:", sessionId, cart);
        } else {
          cart = [];
          console.log("Carrito nuevo para sesión:", sessionId);
        }

        renderCart();
      }

      // Escuchar mensajes de otras ventanas (catálogo)
      window.addEventListener("message", function (event) {
        if (event.data.action === "addToCart") {
          addToCartFromCatalog(event.data.product);
        }
      });

      // Guardar carrito en localStorage con ID de sesión
      function saveCart() {
        const cartKey = "zhaicolezCart_" + sessionId;
        localStorage.setItem(cartKey, JSON.stringify(cart));
        console.log("Carrito guardado:", cartKey, cart);
      }

      // Limpiar carritos antiguos (opcional - limpia sesiones de más de 7 días)
      function cleanOldCarts() {
        const now = Date.now();
        const maxAge = 7 * 24 * 60 * 60 * 1000; // 7 días en milisegundos

        for (let i = 0; i < localStorage.length; i++) {
          const key = localStorage.key(i);
          if (key && key.startsWith("zhaicolezCart_session_")) {
            try {
              const timestamp = parseInt(key.split("_")[2]);
              if (now - timestamp > maxAge) {
                localStorage.removeItem(key);
                console.log("Carrito antiguo eliminado:", key);
              }
            } catch (e) {
              console.log("Error al limpiar carrito:", e);
            }
          }
        }
      }

      // Agregar producto desde catálogo
      function addToCartFromCatalog(product) {
        const existingIndex = cart.findIndex(
          (item) => item.brand === product.brand && item.name === product.name
        );

        if (existingIndex !== -1) {
          cart[existingIndex].quantity += 1;
        } else {
          cart.push({ ...product, quantity: 1 });
        }

        saveCart();
        renderCart();
      }

      // Renderizar carrito
      function renderCart() {
        const cartItemsDiv = document.getElementById("cart-items");
        const summaryDiv = document.getElementById("summary");
        const itemCount = document.getElementById("item-count");

        if (cart.length === 0) {
          cartItemsDiv.innerHTML = `
          <div class="empty-cart">
            <h2>Tu carrito está vacío</h2>
            <p>Agrega productos desde nuestro catálogo</p>
            <a href="/catalogo.html" class="btn-primary">Ir al catálogo</a>
          </div>
        `;
          summaryDiv.style.display = "none";
          itemCount.textContent = "0 productos";
          return;
        }

        // Renderizar productos
        cartItemsDiv.innerHTML = cart
          .map(
            (item, index) => `
        <div class="cart-item">
          <img src="${item.image}" alt="${item.name}" class="item-image" />
          <div class="item-details">
            <div class="item-brand">${item.brand}</div>
            <div class="item-name">${item.name}</div>
            <div class="item-type">${item.type} - ${item.size}</div>
            <div class="item-actions">
              <div class="quantity-controls">
                <button class="quantity-btn" onclick="updateQuantity(${index}, -1)">−</button>
                <span class="quantity">${item.quantity}</span>
                <button class="quantity-btn" onclick="updateQuantity(${index}, 1)">+</button>
              </div>
              <button class="remove-btn" onclick="removeItem(${index})">Eliminar</button>
            </div>
          </div>
          <div class="item-price">$ ${(
            item.price * item.quantity
          ).toLocaleString("es-CO")}</div>
        </div>
      `
          )
          .join("");

        // Actualizar resumen
        const subtotal = cart.reduce(
          (sum, item) => sum + item.price * item.quantity,
          0
        );
        document.getElementById(
          "subtotal"
        ).textContent = `$ ${subtotal.toLocaleString("es-CO")}`;
        document.getElementById(
          "total"
        ).textContent = `$ ${subtotal.toLocaleString("es-CO")}`;

        const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
        itemCount.textContent = `${totalItems} producto${
          totalItems !== 1 ? "s" : ""
        }`;

        summaryDiv.style.display = "block";
      }

      // Actualizar cantidad
      function updateQuantity(index, change) {
        cart[index].quantity += change;
        if (cart[index].quantity <= 0) {
          cart.splice(index, 1);
        }
        saveCart();
        renderCart();
      }

      // Eliminar producto
      function removeItem(index) {
        if (confirm("¿Estás seguro de eliminar este producto?")) {
          cart.splice(index, 1);
          saveCart();
          renderCart();
        }
      }

      // Realizar pedido
      function checkout() {
        const message = cart
          .map(
            (item) =>
              `${item.brand} - ${item.name} (${item.size})\nCantidad: ${
                item.quantity
              }\nPrecio: $${(item.price * item.quantity).toLocaleString(
                "es-CO"
              )}`
          )
          .join("\n\n");

        const total = cart.reduce(
          (sum, item) => sum + item.price * item.quantity,
          0
        );
        const whatsappMessage = encodeURIComponent(
          `¡Hola! Quiero realizar el siguiente pedido:\n\n${message}\n\n*Total: $${total.toLocaleString(
            "es-CO"
          )}*`
        );

        window.open(
          `https://wa.me/573151821269?text=${whatsappMessage}`,
          "_blank"
        );
      }

      // Cargar carrito al iniciar
      loadCart();
      cleanOldCarts(); // Limpiar carritos antiguos
    </script>
  </body>
</html>
