<!DOCTYPE html>
<html lang="es-CO">
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="styles.css" />

    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,400&family=Montserrat:wght@300;400;500;600&display=swap"
      rel="stylesheet"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Carrito - Zhaicolez Inspirations</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
        font-family: Arial, Helvetica, sans-serif;
      }

      body {
        background: #f8f8f8;
        color: #000;
      }

      /* HEADER */
      header {
        background: #fff;
        border-bottom: 1px solid #e5e5e5;
        padding: 16px 40px;
        display: flex;
        align-items: center;
        justify-content: space-between;
      }

      .logo {
        font-size: 22px;
        font-weight: bold;
        letter-spacing: 2px;
      }

      nav ul {
        list-style: none;
        display: flex;
        gap: 24px;
      }

      nav ul li a {
        font-size: 14px;
        text-decoration: none;
        color: #000;
      }

      nav ul li a:hover {
        text-decoration: underline;
      }

      /* CONTENEDOR PRINCIPAL */
      .container {
        max-width: 1200px;
        margin: 40px auto;
        padding: 0 20px;
      }

      .cart-header {
        background: #fff;
        padding: 24px;
        margin-bottom: 24px;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      .cart-header h1 {
        font-size: 28px;
        margin-bottom: 8px;
      }

      .cart-content {
        display: grid;
        grid-template-columns: 1fr 380px;
        gap: 24px;
      }

      /* PRODUCTOS */
      .products-section {
        background: #fff;
        padding: 24px;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
      }

      .empty-cart {
        text-align: center;
        padding: 60px 20px;
      }

      .empty-cart h2 {
        font-size: 24px;
        margin-bottom: 12px;
        color: #666;
      }

      .empty-cart p {
        color: #999;
        margin-bottom: 24px;
      }

      .btn-primary {
        background: #000;
        color: #fff;
        padding: 14px 32px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 14px;
        text-decoration: none;
        display: inline-block;
        transition: background 0.3s;
      }

      .btn-primary:hover {
        background: #333;
      }

      .cart-item {
        display: flex;
        gap: 16px;
        padding: 20px 0;
        border-bottom: 1px solid #e5e5e5;
      }

      .cart-item:last-child {
        border-bottom: none;
      }

      .item-image {
        width: 100px;
        height: 100px;
        object-fit: contain;
        background: #f2f2f2;
        border-radius: 4px;
        flex-shrink: 0;
      }

      .item-details {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }

      .item-brand {
        font-weight: bold;
        font-size: 14px;
      }

      .item-name {
        font-size: 16px;
        color: #333;
      }

      .item-type {
        font-size: 13px;
        color: #666;
      }

      .item-size {
        font-size: 13px;
        color: #000;
        font-weight: 500;
        background: #f0f0f0;
        padding: 4px 8px;
        border-radius: 4px;
        display: inline-block;
        width: fit-content;
      }

      .item-actions {
        display: flex;
        align-items: center;
        gap: 16px;
        margin-top: 8px;
      }

      .quantity-controls {
        display: flex;
        align-items: center;
        gap: 12px;
        border: 1px solid #ddd;
        border-radius: 4px;
        padding: 4px 8px;
      }

      .quantity-btn {
        background: none;
        border: none;
        font-size: 18px;
        cursor: pointer;
        padding: 4px 8px;
        color: #333;
      }

      .quantity-btn:hover {
        color: #000;
      }

      .quantity {
        font-size: 14px;
        min-width: 30px;
        text-align: center;
      }

      .remove-btn {
        background: none;
        border: none;
        color: #999;
        cursor: pointer;
        font-size: 13px;
        text-decoration: underline;
      }

      .remove-btn:hover {
        color: #000;
      }

      .item-price {
        font-weight: bold;
        font-size: 18px;
        text-align: right;
      }

      /* RESUMEN */
      .summary-section {
        background: #fff;
        padding: 24px;
        border-radius: 8px;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        height: fit-content;
        position: sticky;
        top: 20px;
      }

      .summary-section h2 {
        font-size: 20px;
        margin-bottom: 20px;
        padding-bottom: 16px;
        border-bottom: 1px solid #e5e5e5;
      }

      .summary-row {
        display: flex;
        justify-content: space-between;
        margin-bottom: 12px;
        font-size: 14px;
      }

      .summary-row.total {
        font-size: 18px;
        font-weight: bold;
        margin-top: 16px;
        padding-top: 16px;
        border-top: 2px solid #000;
      }

      .checkout-btn {
        width: 100%;
        background: #000;
        color: #fff;
        padding: 16px;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        font-size: 16px;
        margin-top: 20px;
        transition: background 0.3s;
      }

      .checkout-btn:hover {
        background: #333;
      }

      .continue-shopping {
        text-align: center;
        margin-top: 16px;
      }

      .continue-shopping a {
        color: #666;
        text-decoration: none;
        font-size: 14px;
      }

      .continue-shopping a:hover {
        text-decoration: underline;
        color: #000;
      }

      /* RESPONSIVE */
      @media (max-width: 968px) {
        .cart-content {
          grid-template-columns: 1fr;
        }

        .summary-section {
          position: static;
        }
      }

      @media (max-width: 600px) {
        header {
          padding: 16px 20px;
        }

        .logo {
          font-size: 18px;
        }

        nav ul {
          gap: 16px;
        }

        .cart-item {
          flex-direction: column;
        }

        .item-image {
          width: 100%;
          height: 200px;
        }

        .item-price {
          text-align: left;
        }
      }
      .whatsapp-centro {
        position: fixed;
        bottom: 20px;
        left: 50%;
        transform: translateX(-50%);
        background-color: #000;
        color: white;
        padding: 12px 25px;
        border-radius: 30px;
        text-decoration: none;
        font-size: 15px;
        font-weight: bold;
        box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
        z-index: 1000;
        transition: background-color 0.3s;
      }

      .whatsapp-centro:hover {
        background-color: #000;
      }
      .btn-arriba {
        position: fixed;
        bottom: 110px; /* ⬆ lo sube respecto al botón de WhatsApp */
        right: 20px;

        width: 45px;
        height: 45px;
        border-radius: 50%;
        background-color: #000;
        color: white;
        font-size: 22px;
        font-weight: bold;
        border: none;
        cursor: pointer;
        box-shadow: 0 4px 8px rgba(0, 0, 0, 0.3);
        z-index: 1000;
      }
    </style>
  </head>
  <body>
    <!-- HEADER -->
    <header>
      <div class="logo">ZHAICOLEX INSPIRATIONS</div>
      <nav>
        <ul>
          <li><a href="index.html">Volver al catálogo</a></li>
          <li></li>
        </ul>
      </nav>
    </header>

    <!-- CONTENIDO PRINCIPAL -->
    <div class="container">
      <div class="cart-header">
        <h1>Mi Carrito</h1>
        <p id="item-count">0 productos</p>
      </div>

      <div class="cart-content">
        <!-- PRODUCTOS -->
        <div class="products-section">
          <div id="cart-items">
            <div class="empty-cart">
              <h2>Tu carrito está vacío</h2>
              <p>Agrega productos desde nuestro catálogo</p>
              <a href="index.html" class="btn-primary">Ir al catálogo</a>
            </div>
          </div>
        </div>

        <!-- RESUMEN -->
        <div class="summary-section" id="summary" style="display: none">
          <h2>Resumen del pedido</h2>
          <div class="summary-row">
            <span>Subtotal</span>
            <span id="subtotal">$ 0</span>
          </div>
          <div class="summary-row">
            <span>Envío</span>
            <span id="shipping">A calcular</span>
          </div>
          <div class="summary-row total">
            <span>Total</span>
            <span id="total">$ 0</span>
          </div>
          <!-- DESPUÉS -->
          <button class="checkout-btn" onclick="mostrarTerminos()">
            Realizar pedido
          </button>
          <div class="continue-shopping">
            <a href="index.html">← Continuar comprando</a>
          </div>
        </div>
      </div>
    </div>

    <script>
      let cart = [];
      let sessionId = "";

      // Generar ID de sesión único
      function generateSessionId() {
        return (
          "session_" +
          Date.now() +
          "_" +
          Math.random().toString(36).substr(2, 9)
        );
      }

      // Obtener o crear ID de sesión
      function getSessionId() {
        // Buscar en sessionStorage (se borra al cerrar navegador/pestaña)
        let session = sessionStorage.getItem("zhaicolezSessionId");

        if (!session) {
          // Crear nueva sesión
          session = generateSessionId();
          sessionStorage.setItem("zhaicolezSessionId", session);
          console.log("Nueva sesión creada:", session);
        } else {
          console.log("Sesión existente:", session);
        }

        return session;
      }

      // Cargar carrito de la sesión actual
      function loadCart() {
        sessionId = getSessionId();
        const cartKey = "zhaicolezCart_" + sessionId;
        const savedCart = localStorage.getItem(cartKey);

        if (savedCart) {
          cart = JSON.parse(savedCart);
          console.log("Carrito cargado para sesión:", sessionId, cart);
        } else {
          cart = [];
          console.log("Carrito nuevo para sesión:", sessionId);
        }

        renderCart();
      }

      // Escuchar mensajes de otras ventanas (catálogo)
      window.addEventListener("message", function (event) {
        if (event.data.action === "addToCart") {
          addToCartFromCatalog(event.data.product);
        }
      });

      // Guardar carrito en localStorage con ID de sesión
      function saveCart() {
        const cartKey = "zhaicolezCart_" + sessionId;
        localStorage.setItem(cartKey, JSON.stringify(cart));
        console.log("Carrito guardado:", cartKey, cart);
      }

      // Limpiar carritos antiguos (opcional - limpia sesiones de más de 7 días)
      function cleanOldCarts() {
        const now = Date.now();
        const maxAge = 7 * 24 * 60 * 60 * 1000; // 7 días en milisegundos

        for (let i = 0; i < localStorage.length; i++) {
          const key = localStorage.key(i);
          if (key && key.startsWith("zhaicolezCart_session_")) {
            try {
              const timestamp = parseInt(key.split("_")[2]);
              if (now - timestamp > maxAge) {
                localStorage.removeItem(key);
                console.log("Carrito antiguo eliminado:", key);
              }
            } catch (e) {
              console.log("Error al limpiar carrito:", e);
            }
          }
        }
      }

      // Agregar producto desde catálogo
      function addToCartFromCatalog(product) {
        const existingIndex = cart.findIndex(
          (item) =>
            item.brand === product.brand &&
            item.name === product.name &&
            item.size === product.size
        );

        if (existingIndex !== -1) {
          cart[existingIndex].quantity += 1;
        } else {
          cart.push({ ...product, quantity: 1 });
        }

        saveCart();
        renderCart();
      }

      // Renderizar carrito
      function renderCart() {
        const cartItemsDiv = document.getElementById("cart-items");
        const summaryDiv = document.getElementById("summary");
        const itemCount = document.getElementById("item-count");

        if (cart.length === 0) {
          cartItemsDiv.innerHTML = `
          <div class="empty-cart">
            <h2>Tu carrito está vacío</h2>
            <p>Agrega productos desde nuestro catálogo</p>
            <a href="index.html" class="btn-primary">Ir al catálogo</a>
          </div>
        `;
          summaryDiv.style.display = "none";
          itemCount.textContent = "0 productos";
          return;
        }

        // Renderizar productos
        cartItemsDiv.innerHTML = cart
          .map(
            (item, index) => `
        <div class="cart-item">
          <img src="${item.image}" alt="${item.name}" class="item-image" />
          <div class="item-details">
            <div class="item-brand">${item.brand}</div>
            <div class="item-name">${item.name}</div>
            <div class="item-type">${item.type}</div>
            <div class="item-size">${item.size}</div>
            <div class="item-actions">
              <div class="quantity-controls">
                <button class="quantity-btn" onclick="updateQuantity(${index}, -1)">−</button>
                <span class="quantity">${item.quantity}</span>
                <button class="quantity-btn" onclick="updateQuantity(${index}, 1)">+</button>
              </div>
              <button class="remove-btn" onclick="removeItem(${index})">Eliminar</button>
            </div>
          </div>
          <div class="item-price">$ ${(
            item.price * item.quantity
          ).toLocaleString("es-CO")}</div>
        </div>
      `
          )
          .join("");

        // Actualizar resumen
        const subtotal = cart.reduce(
          (sum, item) => sum + item.price * item.quantity,
          0
        );
        document.getElementById(
          "subtotal"
        ).textContent = `$ ${subtotal.toLocaleString("es-CO")}`;
        document.getElementById(
          "total"
        ).textContent = `$ ${subtotal.toLocaleString("es-CO")}`;

        const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
        itemCount.textContent = `${totalItems} producto${
          totalItems !== 1 ? "s" : ""
        }`;

        summaryDiv.style.display = "block";
      }

      // Actualizar cantidad
      function updateQuantity(index, change) {
        cart[index].quantity += change;
        if (cart[index].quantity <= 0) {
          cart.splice(index, 1);
        }
        saveCart();
        renderCart();
      }

      // Eliminar producto
      function removeItem(index) {
        if (confirm("¿Estás seguro de eliminar este producto?")) {
          cart.splice(index, 1);
          saveCart();
          renderCart();
        }
      }

      // Cargar carrito al iniciar
      loadCart();
      cleanOldCarts(); // Limpiar carritos antiguos
      function irArriba() {
        window.scrollTo({
          top: 0,
          behavior: "smooth",
        });
      }
    </script>
    <script>
      async function checkout() {
        const total = cart.reduce(
          (sum, item) => sum + item.price * item.quantity,
          0
        );

        const totalEnCentavos = Math.round(total * 100);
        const referencia = "pedido_" + Date.now();

        const checkoutWidget = new WidgetCheckout({
          currency: "COP",
          amountInCents: totalEnCentavos,
          reference: referencia,
          publicKey: "pub_prod_xr6r8K4K1LmUAdj3j2ysVlUcY7IRtoR4",
          redirectUrl: window.location.href,
        });

        checkoutWidget.open(function (result) {
          const transaction = result.transaction;
          console.log(transaction);

          if (transaction.status === "APPROVED") {
            const message = cart
              .map(
                (item) =>
                  `${item.brand} - ${item.name}\nTamaño: ${
                    item.size
                  }\nCantidad: ${item.quantity}\nPrecio: $${(
                    item.price * item.quantity
                  ).toLocaleString("es-CO")}`
              )
              .join("\n\n");

            const whatsappMessage = encodeURIComponent(
              `✅ ¡Hola! Ya realicé el pago de mi pedido.\n\n📦 Pedido:\n\n${message}\n\n💰 Total pagado: $${total.toLocaleString(
                "es-CO"
              )}\n\n🧾 Referencia: ${referencia}`
            );

            window.open(
              `https://wa.me/573151821269?text=${whatsappMessage}`,
              "_blank"
            );
          }
        });
      }
    </script>

    <script src="https://checkout.wompi.co/widget.js"></script>
    <button class="btn-arriba" onclick="irArriba()">↑</button>
    <script>
      function mostrarTerminos() {
        // Crear modal si no existe
        if (document.getElementById("modalTerminos")) {
          document.getElementById("modalTerminos").style.display = "block";
          return;
        }

        const modal = document.createElement("div");
        modal.id = "modalTerminos";
        modal.style.cssText = `
          display:block;
          position:fixed;
          inset:0;
          background:rgba(0,0,0,0.6);
          z-index:9999;
        `;

        modal.innerHTML = `
          <div style="
            background:#fff;
            width:90%;
            max-width:600px;
            max-height:85vh;
            overflow-y:auto;
            margin:4% auto;
            padding:30px;
            border-radius:14px;
            position:relative;
            font-family:Arial, Helvetica, sans-serif;
            line-height:1.7;
            color:#222;
            box-shadow:0 10px 35px rgba(0,0,0,0.25);
          ">
            <span id="cerrarTerminos" style="
              position:absolute; top:15px; right:18px;
              cursor:pointer; font-size:28px; color:#555;
            ">&times;</span>
    
            <h2 style="font-size:28px; margin-bottom:8px; color:#000; letter-spacing:1px;">
              TÉRMINOS Y CONDICIONES
            </h2>
            <p style="font-size:13px; color:#777; margin-bottom:28px;">
              Última actualización: 6 de enero de 2026
            </p>
            <p style="margin-bottom:22px;">
              Bienvenido a <strong>Zhaicolex Inspirations</strong>. Al acceder, navegar o realizar
              una compra a través de nuestros canales digitales, redes sociales o medios de contacto,
              aceptas cumplir con los presentes Términos y Condiciones.
            </p>
    
            <h3 style="margin-bottom:10px; margin-top:25px;">1. Información general</h3>
            <p style="margin-bottom:18px;">Zhaicolex Inspirations es una perfumería dedicada a la comercialización de perfumes árabes, nicho y de diseñador, en presentaciones originales y/o réplicas.</p>
    
            <h3 style="margin-bottom:10px; margin-top:25px;">2. Productos</h3>
            <p style="margin-bottom:12px;">• Las imágenes de los productos son referenciales.</p>
            <p style="margin-bottom:12px;">• Los precios están expresados en pesos colombianos (COP) y pueden cambiar sin previo aviso.</p>
            <p style="margin-bottom:12px;">• La disponibilidad de los productos está sujeta a inventario.</p>
            <p style="margin-bottom:18px;">• La duración y fijación de los perfumes puede variar según el tipo de piel.</p>
    
            <h3 style="margin-bottom:10px; margin-top:25px;">3. Pedidos y pagos</h3>
            <p style="margin-bottom:12px;">• Los pedidos se confirman únicamente una vez verificado el pago completo.</p>
            <p style="margin-bottom:18px;">• Zhaicolex Inspirations podrá rechazar pedidos por errores de precio, falta de stock o sospecha de fraude.</p>
    
            <h3 style="margin-bottom:10px; margin-top:25px;">4. Envíos</h3>
            <p style="margin-bottom:12px;">• Realizamos envíos a nivel nacional en Colombia.</p>
            <p style="margin-bottom:18px;">• Los tiempos de entrega son estimados y pueden variar por causas externas.</p>
    
            <h3 style="margin-bottom:10px; margin-top:25px;">5. Cambios y devoluciones</h3>
            <p style="margin-bottom:12px;">• Por tratarse de productos cosméticos, no se aceptan devoluciones una vez abierto el producto.</p>
            <p style="margin-bottom:18px;">• Solo se aceptarán cambios por errores de envío o productos defectuosos, reportados dentro de las primeras 24 horas.</p>
    
            <h3 style="margin-bottom:10px; margin-top:25px;">6. Garantía</h3>
            <p style="margin-bottom:12px;">• La garantía cubre únicamente defectos de fábrica.</p>
            <p style="margin-bottom:18px;">• No cubre daños ocasionados por mal uso o almacenamiento inadecuado.</p>
    
            <h3 style="margin-bottom:10px; margin-top:25px;">7. Propiedad intelectual</h3>
            <p style="margin-bottom:18px;">Todo el contenido de Zhaicolex Inspirations está protegido por derechos de autor y propiedad intelectual.</p>
    
            <h3 style="margin-bottom:10px; margin-top:25px;">8. Protección de datos</h3>
            <p style="margin-bottom:18px;">La información personal será tratada conforme a la Ley 1581 de 2012 de Colombia.</p>
    
            <h3 style="margin-bottom:10px; margin-top:25px;">9. Responsabilidad</h3>
            <p style="margin-bottom:18px;">Zhaicolex Inspirations no se hace responsable por reacciones alérgicas derivadas del uso de los productos.</p>
    
            <h3 style="margin-bottom:10px; margin-top:25px;">10. Modificaciones</h3>
            <p style="margin-bottom:18px;">Nos reservamos el derecho de modificar estos términos y condiciones en cualquier momento.</p>
    
            <h3 style="margin-bottom:10px; margin-top:25px;">11. Contacto</h3>
            <p style="margin-bottom:28px;">Para dudas o solicitudes puedes comunicarte mediante nuestros canales oficiales.</p>
    
            <div style="margin-top:35px; padding-top:20px; border-top:1px solid #e5e5e5;">
              <p style="font-size:14px; color:#444; margin-bottom:20px;">
                Al realizar una compra confirmas que has leído y aceptado estos términos y condiciones.
              </p>
              <button id="aceptarTerminos" style="
                width:100%; background:#000; color:#fff; border:none;
                padding:14px; border-radius:8px; cursor:pointer;
                font-size:15px; font-weight:bold;
              ">
                Aceptar y continuar
              </button>
            </div>
          </div>
        `;

        document.body.appendChild(modal);

        // Cerrar con la X o clic fuera
        modal.addEventListener("click", (e) => {
          if (e.target.id === "cerrarTerminos" || e.target === modal) {
            modal.style.display = "none";
          }
        });

        // Aceptar → lanzar el pago
        document
          .getElementById("aceptarTerminos")
          .addEventListener("click", () => {
            modal.style.display = "none";
            checkout(); // ← aquí se llama al pago real
          });
      }
    </script>
  </body>
</html>
