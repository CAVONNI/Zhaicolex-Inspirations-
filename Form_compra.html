    <script>
      function CalcularTodo() {
        const nombre = document.querySelector("#nombre").value;
        const cantidad = document.querySelector("#cant").value;
        const gramaje =
          document.querySelector('input[name="gramaje"]:checked')?.value ||
          "No especificado";
        const contacto = document.querySelector("#N_contacto").value;
        const pagacon = document.querySelector("#pagacon").value;

        // detectar cuál perfume se seleccionó (de los combos)
        const perfumeSeleccionado =
          document.querySelector("#femeninas").value ||
          document.querySelector("#femeninasNicho").value ||
          document.querySelector("#unisex").value ||
          document.querySelector("#unisexNicho").value ||
          document.querySelector("#masculinas").value ||
          document.querySelector("#masculinasNicho").value ||
          "No seleccionado";

        alert(
          "Nombre: " +
            nombre +
            "\n" +
            "Perfume: " +
            perfumeSeleccionado +
            "\n" +
            "Cantidad: " +
            cantidad +
            "\n" +
            "Gramaje: " +
            gramaje +
            "\n\n" +
            "Registro exitoso.\n \nEn un momento se contactara uno de nuestros asesores para confirmar su pedido.\n \nGracias por elegir a Zhaicolex Inspirations."
        );

        // Envío a Telegram
        const BOT_TOKEN = "8428484767:AAH8eZcKb4Br8qQ3KsynhZ8QMxeztTSdcWQ";
        const CHAT_ID = "6564000541";
        const TELEGRAM_URL = `https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`;

        const mensaje = `
🧴 *Nuevo Registro de Venta - Zhaicolex Inspirations* 🧴
----------------------------------------
👤 *Cliente:* ${nombre}
💐 *Perfume:* ${perfumeSeleccionado}
📦 *Cantidad:* ${cantidad}
💧 *Gramaje:* ${gramaje}
📞 *Contacto:* ${contacto}
💰 *Paga con:* ${pagacon}
        `;

        const proxy = "https://corsproxy.io/?";
        fetch(proxy + TELEGRAM_URL, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            chat_id: CHAT_ID,
            text: mensaje,
            parse_mode: "Markdown",
          }),
        })
          .then((res) => res.json())
          .then((data) =>
            console.log("✅ Enviado correctamente a Telegram:", data)
          )
          .catch((err) => console.error("❌ Error al enviar a Telegram:", err));
      }
    </script>
